<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Juego de Memoria - Desarrollo de Software</title>
<style>
body{margin:0;font-family:Segoe UI;background:#0d1b1e;color:#fff}
.wrap{max-width:1100px;margin:auto;padding:20px}
h1{text-align:center;color:#ffd86a}
.info,.controls{display:flex;gap:18px;justify-content:center;align-items:center;flex-wrap:wrap;margin:12px 0}
.controls button{padding:10px 16px;border:none;border-radius:8px;background:#197c7b;color:#fff;cursor:pointer}
.board{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.card{aspect-ratio:1;perspective:800px}
.inner{position:relative;width:100%;height:100%;transform-style:preserve-3d;transition:.6s}
.card.flip .inner{transform:rotateY(180deg)}
.face{position:absolute;inset:0;backface-visibility:hidden;border-radius:12px;border:2px solid #2d595d;display:flex;align-items:center;justify-content:center}
.back{background:#16353b;font-size:42px;color:#ffd86a;font-weight:bold}
.front{transform:rotateY(180deg);background:#143338;flex-direction:column;padding:8px}
.front svg{width:78%;height:78%}
.front small{text-align:center}
.match .front{background:#1f8d4c}
.wrong .front{background:#b32929}
</style>
</head>
<body>
<div class="wrap">
<h1>Juego de Memoria</h1>
<div class="info">
<div>Tiempo: <b id=t>01:30</b></div>
<div>Movimientos: <b id=m>0</b></div>
<div>Parejas: <b id=p>0</b>/10</div>
</div>
<div class="controls">
<button id=start>Iniciar 1:30</button>
<button id=show>Mostrar cartas</button>
<button id=reset>Reiniciar tablero</button>
</div>
<div id=board class=board></div>
</div>
<script>
const defs=[
["Código",`<svg viewBox="0 0 100 100"><rect x="10" y="15" width="80" height="70" rx="8" fill="#39b6ff22" stroke="#4fc3f7"/><path d="M38 35 24 50l14 15M62 35l14 15-14 15M56 28 44 72" stroke="#4fc3f7" stroke-width="4" fill="none"/></svg>`],
["Diseño",`<svg viewBox="0 0 100 100"><path d="M50 15c20 0 35 15 35 35S70 85 50 85c-8 0-12-4-12-9 0-4 3-7 7-7h5c6 0 10-4 10-10 0-7-6-12-13-12-9 0-17 7-17 17" fill="#ffca6a"/><rect x="65" y="18" width="8" height="35" transform="rotate(35 69 35)" fill="#8d6e63"/></svg>`],
["Base de datos",`<svg viewBox="0 0 100 100"><ellipse cx="50" cy="22" rx="24" ry="8" fill="#7fdc84"/><rect x="26" y="22" width="48" height="42" fill="#7fdc84"/><ellipse cx="50" cy="64" rx="24" ry="8" fill="#6acb70"/><ellipse cx="50" cy="43" rx="24" ry="8" fill="#8ae68f"/></svg>`],
["Testing",`<svg viewBox="0 0 100 100"><circle cx="42" cy="42" r="18" fill="none" stroke="#b39ddb" stroke-width="5"/><line x1="54" y1="54" x2="72" y2="72" stroke="#b39ddb" stroke-width="5"/><ellipse cx="42" cy="42" rx="6" ry="9" fill="#333"/><line x1="36" y1="36" x2="30" y2="30" stroke="#333"/><line x1="48" y1="36" x2="54" y2="30" stroke="#333"/></svg>`],
["Servidor",`<svg viewBox="0 0 100 100"><rect x="30" y="15" width="40" height="70" rx="4" fill="#90a4ae"/><line x1="35" y1="35" x2="65" y2="35" stroke="#fff"/><line x1="35" y1="55" x2="65" y2="55" stroke="#fff"/><circle cx="38" cy="28" r="2" fill="#0f0"/><circle cx="38" cy="48" r="2" fill="#ff0"/></svg>`],
["Git",`<svg viewBox="0 0 100 100"><circle cx="30" cy="25" r="5" fill="#ff7043"/><circle cx="30" cy="75" r="5" fill="#ff7043"/><circle cx="70" cy="50" r="5" fill="#ff7043"/><path d="M30 25v50M30 50h40" stroke="#ff7043" stroke-width="4"/></svg>`],
["Nube",`<svg viewBox="0 0 100 100"><path d="M28 65h42c10 0 15-7 15-14S79 38 70 38c-3-10-11-16-21-16-11 0-20 7-22 18-8 1-14 8-14 17 0 5 5 8 15 8z" fill="#4dd0e1"/><path d="M50 30v30M42 52l8 8 8-8" stroke="#fff" stroke-width="4" fill="none"/></svg>`],
["API",`<svg viewBox="0 0 100 100"><rect x="18" y="35" width="24" height="30" fill="#ffd54f"/><rect x="58" y="35" width="24" height="30" fill="#ffd54f"/><path d="M42 50h16" stroke="#fff" stroke-width="5"/></svg>`],
["IA",`<svg viewBox="0 0 100 100"><rect x="30" y="30" width="40" height="40" rx="6" fill="#ba68c8"/><path d="M20 40h10M20 60h10M70 40h10M70 60h10M40 20v10M60 20v10M40 70v10M60 70v10" stroke="#ba68c8" stroke-width="4"/></svg>`],
["Ciberseguridad",`<svg viewBox="0 0 100 100"><path d="M50 18 74 28v22c0 17-12 27-24 32-12-5-24-15-24-32V28z" fill="#26c6da"/><rect x="43" y="45" width="14" height="14" fill="#fff"/><path d="M46 45v-5a4 4 0 118 0v5" stroke="#fff" stroke-width="3" fill="none"/></svg>`]
];
let data=[],a=null,b=null,lock=false,moves=0,pairs=0,time=90,intv=null,paused=true;
const letters="ABCDEFGHIJKLMNOPQRST".split('');
function shuffle(x){for(let i=x.length-1;i>0;i--){let j=Math.random()*(i+1)|0;[x[i],x[j]]=[x[j],x[i]]}}
function build(){data=[];defs.forEach((d,i)=>{data.push({id:i,...Object.fromEntries([["n",d[0]],["svg",d[1]]])});data.push({id:i,n:d[0],svg:d[1]})});shuffle(data);const b=document.getElementById('board');b.innerHTML='';data.forEach((c,i)=>{const div=document.createElement('div');div.className='card';div.dataset.i=i;div.innerHTML=`<div class=inner><div class="face back">${letters[i]}</div><div class="face front">${c.svg}<small>${c.n}</small></div></div>`;div.onclick=()=>flip(div);b.append(div)});}
function upd(){m.textContent=moves;p.textContent=pairs;let mm=("0"+(time/60|0)).slice(-2),ss=("0"+time%60).slice(-2);t.textContent=mm+":"+ss}
function flip(el){if(lock||el.classList.contains('match')||el===a)return;el.classList.add('flip');if(!a){a=el;return}b=el;lock=true;moves++;upd();let ca=data[a.dataset.i],cb=data[b.dataset.i];if(ca.id==cb.id){a.classList.add('match');b.classList.add('match');a=b=null;lock=false;pairs++;upd();}else{a.classList.add('wrong');b.classList.add('wrong');setTimeout(()=>{a.classList.remove('wrong','flip');b.classList.remove('wrong','flip');a=b=null;lock=false;},3000)}}
start.onclick=()=>{if(paused){paused=false;start.textContent="Pausar";intv=setInterval(()=>{if(time>0){time--;upd()}},1000)}else{paused=true;start.textContent="Iniciar 1:30";clearInterval(intv)}}
show.onclick=()=>{if(lock)return;lock=true;document.querySelectorAll('.card').forEach(c=>c.classList.add('flip'));setTimeout(()=>{document.querySelectorAll('.card').forEach(c=>{if(!c.classList.contains('match'))c.classList.remove('flip')});lock=false},5000)}
reset.onclick=()=>{clearInterval(intv);paused=true;start.textContent="Iniciar 1:30";time=90;moves=0;pairs=0;a=b=null;lock=false;upd();build()}
upd();build();
</script>
</body></html>
